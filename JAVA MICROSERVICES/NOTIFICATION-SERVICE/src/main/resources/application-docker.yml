server:
  port: 8087

spring:
  application:
    name: NOTIFICATION-SERVICE

  config:
    import: "optional:configserver:http://config-server:8888"

  datasource:
    url: jdbc:postgresql://postgres:5432/news_notification_db
    username: newsadmin
    password: root
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"