server:
  port: 8888

spring:
  application:
    name: CONFIG-SERVER

  profiles:
    active: native,local

  cloud:
    config:
      server:
        native:
          search-locations: file:///D:/News App Final/config-repo

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"