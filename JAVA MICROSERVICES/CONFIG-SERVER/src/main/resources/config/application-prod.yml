spring:

  config:
    import: "optional:configserver:"

  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config

eureka:
  client:
    service-url:
      defaultZone: https://service-registry-latest-n6dg.onrender.com/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"