spring:
  config:
    import: optional:configserver:http://config-server:8888

  datasource:
    url: jdbc:postgresql://postgres:5432/news_analytics_db
    username: newsadmin
    password: root

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false